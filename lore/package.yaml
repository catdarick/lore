name:                lore
version:             0.1.0.0
github:              "githubuser/lore"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/lore#readme>

dependencies:
- base >= 4.7 && < 5
- Cabal
- time
- aeson
- bytestring
- co-log-core
- containers
- directory
- exceptions
- filepath
- deepseq
- ghc >= 9.6 && < 9.9
- ghc-paths
- ghc-boot
- mtl
- process
- text
- transformers
- unliftio
- megaparsec
- yaml
- edit-distance

ghc-options:
- -Werror
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
  - Lore
  - Lore.Config
  - Lore.Definition
  - Lore.DeadCode
  - Lore.Definition.RenderSlice
  - Lore.Definition.Rendering
  - Lore.Diagnostics
  - Lore.Interpreter
  - Lore.Logger
  - Lore.List
  - Lore.Lookup
  - Lore.Lookup.Search
  - Lore.Monad
  - Lore.Project
  - Lore.Refactor.ImportCleanup.Internal
  - Lore.Session
  - Lore.SourceEdit
  - Lore.SourceSpan
  - Lore.SourceText
  - Lore.TestSuite
  - Lore.TemporalModules
  - Lore.HomeModules
  - Lore.HomeModules.Plan
  - Lore.Internal.Ghc.ValueTypeHead
  - Lore.Internal.Lookup.ModulePattern
  - Lore.Internal.Lookup.ModulePreference
  - Lore.Internal.Lookup.SymbolResolutionCore
  - Lore.Internal.Lookup.TypeQuery
  - Lore.Internal.Lookup.Types



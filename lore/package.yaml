name:                lore
version:             0.1.0.0
github:              "githubuser/lore"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/lore#readme>

dependencies:
- base >= 4.7 && < 5
- Cabal
- time
- aeson
- bytestring
- co-log-core
- containers
- directory
- exceptions
- filepath
- deepseq
- ghc
- ghc-paths
- ghc-boot
- hpack
- mtl
- process
- text
- transformers
- unliftio
- megaparsec
- yaml
- edit-distance

ghc-options:
- -Werror
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
  - Lore
  - Lore.Definition
  - Lore.DeadCode
  - Lore.Definition.RenderSlice
  - Lore.Definition.Rendering
  - Lore.Diagnostics
  - Lore.Interpreter
  - Lore.Logger
  - Lore.List
  - Lore.Lookup
  - Lore.Lookup.Search
  - Lore.Monad
  - Lore.Project
  - Lore.Refactor.ImportCleanup.Internal
  - Lore.Session
  - Lore.SourceEdit
  - Lore.SourceSpan
  - Lore.SourceText
  - Lore.TestSuite
  - Lore.TemporalModules
  - Lore.HomeModules
  - Lore.HomeModules.Plan
  - Lore.Internal.Lookup.ModulePreference
  - Lore.Internal.Lookup.SymbolResolutionCore
  - Lore.Internal.Lookup.TypeQuery


tests:
  lore-test:
    main:                Spec.hs
    source-dirs:
    - test
    - src
    other-modules:
    - DefinitionSpec
    - DeadCodeSpec
    - ImportCleanupApplySpec
    - ImportCleanupEditSpec
    - ImportCleanupImportListParserSpec
    - ImportCleanupResolveSpec
    - ImportCleanupRewriteSpec
    - InterpreterSpec
    - LookupSpec
    - LookupSearchSpec
    - LoggerSpec
    - RedundantImportsSpec
    - SourceEditSpec
    - HomeModulesSpec
    - PackageEnvironmentSpec
    - TemporalModulesSpec
    - TestSupport
    - SomeModule
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wno-incomplete-patterns
    - -Wno-missing-home-modules
    dependencies:
    - hspec

default-extensions:
  - RecordWildCards
  - NamedFieldPuns
  - DuplicateRecordFields
  - OverloadedLabels
  - OverloadedStrings
  - FlexibleContexts
  - FlexibleInstances
  - StandaloneDeriving
  - ScopedTypeVariables
  - ExplicitForAll
  - TypeOperators
  - TypeApplications
  - DeriveGeneric
  - MonoLocalBinds
  - DerivingStrategies
  - BlockArguments
  - PostfixOperators
  - TupleSections
  - LambdaCase
  - NumericUnderscores
  - MultiWayIf
  - BangPatterns
  - ConstraintKinds
  - DataKinds
  - DefaultSignatures
  - DerivingVia
  - EmptyDataDecls
  - ExistentialQuantification
  - FunctionalDependencies
  - GADTs
  - KindSignatures
  - MultiParamTypeClasses
  - NumDecimals
  - PatternSynonyms
  - RankNTypes
  - TypeFamilies
  - ViewPatterns
  - PartialTypeSignatures
  - OverloadedRecordDot

language: Haskell2010

version: "3"

dotenv: ['.env']

includes:
  local:
    taskfile: Taskfile.local.yml
    optional: true

tasks:
  release:set-version:
    desc: Set the Lore release version (for example, VERSION=0.2.0.0)
    requires:
      vars: [VERSION]
    cmds:
      - python3 scripts/set-release-version.py "{{.VERSION}}"

  build:
    desc: Build the workspace with stack
    cmds:
      - stack build
  
  install: 
    desc: Install lore-mcp and lore-cli with stack
    cmds:
      - stack clean lore lore-mcp lore-tools-cli && stack install lore-mcp lore-tools-cli --ghc-options="-O2"

  format:
    desc: Format Haskell sources with ormolu
    cmds:
      - |
        ormolu --mode inplace \
          $(find lore lore-mcp -type f \( -name '*.hs' -o -name '*.hs-boot' \) | sort)

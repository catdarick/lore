version: "3"

tasks:
  build:
    desc: Build the workspace with stack
    cmds:
      - stack build

  mcp-inspector:
    desc: Run MCP Inspector for lore-mcp; set MCP_HOST_IP for remote browser access
    cmds:
      - stack build lore-mcp
      - |
        HOST=0.0.0.0 \
        HSPEC_FORMAT=failed-examples \
        HSPEC_COLOR=no \
        LORE_MCP_LOG_LEVEL=debug \
        LORE_MCP_ENABLE_DEFINITION_KNOWLEDGE_CACHE=true \
        ALLOWED_ORIGINS="http://localhost:6274,http://127.0.0.1:6274${MCP_HOST_IP:+,http://$MCP_HOST_IP:6274}" \
        npx @modelcontextprotocol/inspector \
          --config "$PWD/mcp.json" \
          --server lore-mcp

  format:
    desc: Format Haskell sources with ormolu
    cmds:
      - |
        ormolu --mode inplace \
          $(find lore lore-mcp -type f \( -name '*.hs' -o -name '*.hs-boot' \) | sort)

  bench-smoke:
    desc: Run fast benchmark smoke suite (definition/reference/e2e-small load)
    cmds:
      - ./lore/scripts/bench-smoke.sh

  bench-full:
    desc: Run full benchmark suite (pure + e2e)
    cmds:
      - ./lore/scripts/bench-full.sh

  bench-e2e:
    desc: Run e2e-only benchmark suite
    cmds:
      - ./lore/scripts/bench-e2e.sh

  bench-json:
    desc: Run full suite and write timestamped Criterion JSON under lore/bench-results
    cmds:
      - ./lore/scripts/bench-json.sh

  bench-compare:
    desc: "Compare benchmark JSON means (usage: task bench-compare -- <old.json> <new.json>)"
    cmds:
      - ./lore/scripts/bench-compare.sh {{.CLI_ARGS}}

  bench-memory:
    desc: Run GHC.Stats memory benchmark suite (+RTS -T)
    cmds:
      - ./lore/scripts/bench-memory.sh

  bench-memory-stats:
    desc: Run memory benchmark suite with RTS summary output (+RTS -T -s)
    cmds:
      - ./lore/scripts/bench-memory-stats.sh

  bench-memory-e2e:
    desc: Run e2e-only memory benchmark mode (+RTS -T -s)
    cmds:
      - ./lore/scripts/bench-memory-e2e.sh

  bench-pipeline-run:
    desc: Run CPU + memory benchmarks in one pipeline run and store artifacts under one run ID
    cmds:
      - ./lore/scripts/bench-pipeline-run.sh

  bench-pipeline-compare:
    desc: "Compare two pipeline runs (usage: task bench-pipeline-compare -- <old-run-id> <new-run-id>)"
    cmds:
      - ./lore/scripts/bench-pipeline-compare.sh {{.CLI_ARGS}}

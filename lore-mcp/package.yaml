name:                lore-mcp
version:             0.1.0.0
github:              "githubuser/lore"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md

description:         MCP executable package for the lore workspace

dependencies:
- base >= 4.7 && < 5
- aeson
- bytestring
- containers
- directory
- exceptions
- filepath
- ghc
- lore
- text
- time
- openapi3
- lens
- vector 
- unliftio
- mtl

ghc-options:
- -Werror
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

executables:
  lore-mcp:
    main:                Main.hs
    source-dirs:
    - app
    - src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N

tests:
  lore-mcp-test:
    main:                Spec.hs
    source-dirs:
    - test
    - src
    other-modules:
    - GetDefinitionSpec
    - McpTestSupport
    - ProtocolRequestSpec
    - Lore.JsonRpc.Server
    - Lore.Mcp.Internal.Annotated
    - Lore.Mcp.Internal.Render
    - Lore.Mcp.Internal.Tool
    - Lore.Mcp.Monad
    - Lore.Mcp.Protocol.Request
    - Lore.Mcp.Protocol.Server
    - Lore.Mcp.Server
    - Lore.Mcp.Tools.ExecuteCode
    - Lore.Mcp.Tools.Feedback
    - Lore.Mcp.Tools.FindReferences
    - Lore.Mcp.Tools.GetDefinition.Cached
    - Lore.Mcp.Tools.GetDefinition.Regular
    - Lore.Mcp.Tools.GetDefinition.Shared
    - Lore.Mcp.Tools.GetTypeOfExpression
    - Lore.Mcp.Tools.ListExportedSymbols
    - Lore.Mcp.Tools.LookupInstances
    - Lore.Mcp.Tools.LookupSymbolInfo
    - Lore.Mcp.Tools.NotifyKnowledgeReset
    - Lore.Mcp.Tools.ReloadHomeModules
    - Lore.Mcp.Tools.Shared
    - Lore.Mcp.Tools.Shared.CompactClassInstance
    - Lore.Mcp.Tools.Shared.DefinitionLocation
    - Lore.Mcp.Tools.Shared.DetailedSymbolInfo
    - Lore.Mcp.Tools.Shared.Diagnostics
    - Lore.Mcp.Tools.Shared.Outputable
    - Lore.Mcp.Tools.Shared.PartialLoadWarning
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wno-incomplete-patterns
    dependencies:
    - hspec

language: Haskell2010

default-extensions:
  - RecordWildCards
  - NamedFieldPuns
  - DuplicateRecordFields
  - OverloadedLabels
  - OverloadedStrings
  - FlexibleContexts
  - FlexibleInstances
  - StandaloneDeriving
  - ScopedTypeVariables
  - ExplicitForAll
  - TypeOperators
  - TypeApplications
  - DeriveGeneric
  - MonoLocalBinds
  - DerivingStrategies
  - BlockArguments
  - PostfixOperators
  - TupleSections
  - LambdaCase
  - NumericUnderscores
  - MultiWayIf
  - BangPatterns
  - ConstraintKinds
  - DataKinds
  - DefaultSignatures
  - DerivingVia
  - EmptyDataDecls
  - ExistentialQuantification
  - FunctionalDependencies
  - GADTs
  - KindSignatures
  - MultiParamTypeClasses
  - NumDecimals
  - PatternSynonyms
  - RankNTypes
  - TypeFamilies
  - ViewPatterns
  - PartialTypeSignatures
  - OverloadedRecordDot

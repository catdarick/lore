name:                lore-mcp
version:             0.1.0.0
github:              "githubuser/lore"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md

description:         MCP executable package for the lore workspace

dependencies:
- base >= 4.7 && < 5
- aeson
- bytestring
- exceptions
- ghc
- lore
- text
- openapi3
- lens
- vector 
- unliftio

ghc-options:
- -Werror
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

executables:
  lore-mcp:
    main:                Main.hs
    source-dirs:
    - app
    - src
    other-modules:
    - Lore.JsonRpc.Server
    - Lore.Mcp.Internal.Annotated
    - Lore.Mcp.Internal.Tool
    - Lore.Mcp.Protocol.Request
    - Lore.Mcp.Protocol.Server
    - Lore.Mcp.Server
    - Lore.Mcp.Tools.ExecuteCode
    - Lore.Mcp.Tools.GetDefinition
    - Lore.Mcp.Tools.GetTypeOfExpression
    - Lore.Mcp.Tools.ListExportedSymbols
    - Lore.Mcp.Tools.LookupInstances
    - Lore.Mcp.Tools.LookupSymbolInfo
    - Lore.Mcp.Tools.ReloadHomeModules
    - Lore.Mcp.Tools.Shared
    - Lore.Mcp.Tools.Shared.Diagnostics
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N

language: Haskell2010

default-extensions:
  - RecordWildCards
  - NamedFieldPuns
  - DuplicateRecordFields
  - OverloadedLabels
  - OverloadedStrings
  - FlexibleContexts
  - FlexibleInstances
  - StandaloneDeriving
  - ScopedTypeVariables
  - ExplicitForAll
  - TypeOperators
  - TypeApplications
  - DeriveGeneric
  - MonoLocalBinds
  - DerivingStrategies
  - BlockArguments
  - PostfixOperators
  - TupleSections
  - LambdaCase
  - NumericUnderscores
  - MultiWayIf
  - BangPatterns
  - ConstraintKinds
  - DataKinds
  - DefaultSignatures
  - DerivingVia
  - EmptyDataDecls
  - ExistentialQuantification
  - FunctionalDependencies
  - GADTs
  - KindSignatures
  - MultiParamTypeClasses
  - NumDecimals
  - PatternSynonyms
  - RankNTypes
  - TypeFamilies
  - ViewPatterns
  - PartialTypeSignatures
  - OverloadedRecordDot
